<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Cours Théoriques - Code de la Route Sénégal</title>
    <meta name="theme-color" content="#00853F">
    <style>
        :root {
            --green:#00853F; --green-dark:#006d33; --yellow:#FDEF42; --red:#E31B23;
            --bg:#0f172a; --bg-card:#1e293b; --bg-deep:#020617;
            --text:#f1f5f9; --text-muted:#94a3b8;
            --primary:#38bdf8; --success:#10b981; --error:#ef4444; --warning:#f59e0b;
            --radius:12px;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
        header{background:linear-gradient(135deg,var(--green),var(--green-dark));padding:1rem 1.25rem;display:flex;align-items:center;gap:.875rem;box-shadow:0 2px 12px rgba(0,133,63,.4);position:sticky;top:0;z-index:100;}
        .flag{width:48px;height:32px;border-radius:3px;overflow:hidden;display:flex;flex-shrink:0;border:1px solid rgba(255,255,255,.3);}
        .flag-g{flex:1;background:var(--green);} .flag-y{flex:1;background:var(--yellow);display:flex;align-items:center;justify-content:center;} .flag-r{flex:1;background:var(--red);}
        .flag-star{color:var(--green);font-size:14px;}
        .header-text h1{font-size:1.1rem;font-weight:700;color:#fff;} .header-text p{font-size:.75rem;color:rgba(255,255,255,.8);}
        .container{padding:1rem;max-width:680px;margin:0 auto;}
        .back-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.875rem;margin-bottom:1rem;display:flex;align-items:center;gap:.4rem;padding:0;}
        .back-btn:hover{color:var(--text);}
        .card{background:var(--bg-card);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;box-shadow:0 4px 12px rgba(0,0,0,.3);}
        .btn{background:var(--green);color:#fff;border:none;padding:.875rem 1.5rem;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:.5rem;width:100%;}
        .btn:hover{background:var(--green-dark);transform:translateY(-1px);}
        .btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary);}
        .btn-outline:hover{background:var(--primary);color:var(--bg);}

        /* LISTE DES MODULES */
        #screen-list{display:block;}
        #screen-detail{display:none;}
        .page-title{font-size:1.3rem;font-weight:800;margin-bottom:.25rem;}
        .page-sub{color:var(--text-muted);font-size:.875rem;margin-bottom:1.5rem;}
        .module-card{background:var(--bg-deep);border:2px solid transparent;border-radius:10px;padding:1rem 1.25rem;margin-bottom:.75rem;cursor:pointer;display:flex;align-items:center;gap:1rem;transition:all .2s;}
        .module-card:hover{border-color:var(--green);background:rgba(0,133,63,.08);transform:translateY(-1px);}
        .module-icon{font-size:2.2rem;flex-shrink:0;}
        .module-info{flex:1;}
        .module-title{font-weight:700;font-size:1rem;margin-bottom:.2rem;}
        .module-desc{font-size:.8rem;color:var(--text-muted);line-height:1.4;}
        .module-meta{font-size:.72rem;color:var(--primary);margin-top:.3rem;}
        .module-arrow{color:var(--text-muted);font-size:1.2rem;}

        /* CONTENU DU COURS */
        #coursDetailContent h2{font-size:1.2rem;font-weight:800;margin:1.5rem 0 .75rem;color:var(--primary);}
        #coursDetailContent h2:first-child{margin-top:0;}
        #coursDetailContent h3{font-size:1rem;font-weight:700;margin:1.25rem 0 .5rem;color:var(--text);}
        #coursDetailContent p{font-size:.875rem;line-height:1.7;margin-bottom:.75rem;color:var(--text);}
        #coursDetailContent ul, #coursDetailContent ol{margin-left:1.25rem;margin-bottom:.75rem;font-size:.875rem;line-height:1.8;}
        #coursDetailContent li{color:var(--text);}
        #coursDetailContent strong{color:var(--primary);}
        #coursDetailContent .info-box{background:rgba(56,189,248,.08);border-left:3px solid var(--primary);padding:.875rem 1rem;border-radius:6px;margin-bottom:1rem;font-size:.85rem;line-height:1.6;}
        #coursDetailContent .warning-box{background:rgba(239,68,68,.08);border-left:3px solid var(--error);padding:.875rem 1rem;border-radius:6px;margin-bottom:1rem;font-size:.85rem;line-height:1.6;}
        #coursDetailContent .success-box{background:rgba(16,185,129,.08);border-left:3px solid var(--success);padding:.875rem 1rem;border-radius:6px;margin-bottom:1rem;font-size:.85rem;line-height:1.6;}
        #coursDetailContent img{max-width:100%;border-radius:8px;}
    </style>
</head>
<body>
    <header>
        <div class="flag"><div class="flag-g"></div><div class="flag-y"><span class="flag-star">★</span></div><div class="flag-r"></div></div>
        <div class="header-text"><h1>Cours Théoriques</h1><p>Code de la Route • Sénégal</p></div>
    </header>

    <div class="container">
        <!-- LISTE DES MODULES -->
        <div id="screen-list">
            <button class="back-btn" onclick="window.location.href='index.html'">← Accueil</button>
            <div class="page-title">📚 Cours théoriques</div>
            <div class="page-sub">Choisissez un chapitre pour commencer</div>
            <div id="modulesGrid"></div>
        </div>

        <!-- DÉTAIL DU COURS -->
        <div id="screen-detail">
            <button class="back-btn" onclick="showList()">← Retour aux cours</button>
            <div class="card">
                <div id="coursDetailContent"></div>
            </div>
            <button class="btn btn-outline" onclick="showList()" style="margin-bottom:2rem;">← Retour aux cours</button>
        </div>
    </div>

    <script src="js/cours.js"></script>
    <script>
        function renderModules() {
            const grid = document.getElementById('modulesGrid');
            if (!grid || !window.modules) {
                grid.innerHTML = '<p style="color:var(--error);text-align:center;">Erreur : modules non chargés.</p>';
                return;
            }
            grid.innerHTML = modules.map(m => `
                <div class="module-card" onclick="openCours('${m.id}')">
                    <span class="module-icon">${m.icon}</span>
                    <div class="module-info">
                        <div class="module-title">${m.title}</div>
                        <div class="module-desc">${m.desc}</div>
                        <div class="module-meta">${m.lessons} leçons · ${m.duration}</div>
                    </div>
                    <span class="module-arrow">›</span>
                </div>
            `).join('');
        }

        function openCours(id) {
            const m = modules.find(x => x.id === id);
            if (!m) return;
            document.getElementById('coursDetailContent').innerHTML = m.content;
            document.getElementById('screen-list').style.display = 'none';
            document.getElementById('screen-detail').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function showList() {
            document.getElementById('screen-list').style.display = 'block';
            document.getElementById('screen-detail').style.display = 'none';
            window.scrollTo(0, 0);
        }

        renderModules();
    </script>
</body>
</html>
